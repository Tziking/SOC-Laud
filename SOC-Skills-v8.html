<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>SOC Skills v8 — Renta Shalet</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=DM+Mono:wght@300;400;500&family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060606;--s1:#0c0c0c;--s2:#111;--s3:#171717;
  --b:#1a1a1a;--b2:#222;--b3:#2a2a2a;
  --acc:#c8ff00;--warn:#ffd166;--danger:#ff3b3b;--ok:#3dff7e;
  --txt:#d8d8d8;--m:#444;--m2:#777;
  --gold:#ffd700;--gold2:#ffaa00;--gold3:#cc9900;
  --f:'DM Mono',monospace;--fp:'Silkscreen',cursive;--f8:'Press Start 2P',monospace;
  --c1:#3dff7e;--c2:#ffd166;--c3:#ff6b35;--c4:#c8ff00;--c5:#b088ff;--cm:#ffd700;
  /* RS palette */
  --rs-bg:#1b1710;--rs-cell:#1e1a14;--rs-border:#3d3526;--rs-border2:#2e2820;
  --rs-header:#2a221a;--rs-gold:#ffd700;--rs-gold2:#e8b000;
}
body{background:var(--bg);color:var(--txt);font-family:var(--f);font-size:11px;
  min-height:100dvh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;user-select:none}

/* ═══ XP DROP ═══ */
.xp-drop{position:fixed;pointer-events:none;z-index:600;font-family:var(--f8);
  font-size:11px;color:var(--rs-gold);text-shadow:0 0 8px rgba(255,215,0,.6),0 0 3px rgba(0,0,0,1);
  animation:xpFloat 2s ease-out forwards}
@keyframes xpFloat{
  0%{opacity:1;transform:translateY(0) scale(1)}
  60%{opacity:1;transform:translateY(-50px) scale(1.1)}
  100%{opacity:0;transform:translateY(-80px) scale(.8)}
}

/* ═══ HEADER ═══ */
.hdr{background:var(--rs-header);border-bottom:2px solid var(--rs-border);padding:8px 12px;
  position:sticky;top:0;z-index:100}
.hdr-r1{display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-family:var(--fp);font-size:12px;color:var(--rs-gold);letter-spacing:1px;
  text-shadow:0 0 6px rgba(255,215,0,.2)}
.hdr-total{font-family:var(--fp);font-size:10px;color:var(--gold)}
.hdr-bar{height:4px;background:var(--b);border-radius:2px;overflow:hidden;margin-top:5px}
.hdr-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--gold));border-radius:2px;transition:width 1s ease}
.hdr-info{display:flex;gap:8px;margin-top:4px}
.hdr-info span{font-size:7px;color:var(--m2);font-family:var(--fp)}
.hdr-info b{color:var(--txt)}

/* ═══ SYSTEM LEVEL ═══ */
.sys{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--s2);border-bottom:1px solid var(--b)}
.sys-orb{width:40px;height:40px;border:2px solid var(--gold);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-family:var(--f8);
  font-size:13px;color:var(--gold);background:radial-gradient(circle,#161000,var(--bg));
  box-shadow:0 0 14px rgba(255,215,0,.1)}
.sys-txt{flex:1}
.sys-nm{font-family:var(--fp);font-size:10px;color:var(--gold)}
.sys-sub{font-size:7px;color:var(--m2);font-family:var(--fp);margin-top:1px}

/* ═══ TABS ═══ */
.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--b)}
.tb{flex:1;padding:6px;text-align:center;font-family:var(--fp);font-size:7px;
  color:var(--m);cursor:pointer;border-bottom:2px solid transparent;letter-spacing:.5px}
.tb.on{color:var(--acc);border-bottom-color:var(--acc)}

/* ═══ RS SKILLS HEADER ═══ */
.rs-skills-hdr{
  background:linear-gradient(180deg,#2d2318 0%,#1e1812 100%);
  border-bottom:2px solid var(--rs-border);
  padding:8px 10px 6px;
  position:relative;overflow:hidden;
}
.rs-skills-hdr::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,#e03030 25%,#3090e0 25%,#3090e0 50%,#30c030 50%,#30c030 75%,#e0c030 75%);
}
.rs-skills-title{
  font-family:var(--fp);font-size:11px;color:var(--rs-gold);text-align:center;
  text-shadow:1px 1px 0 #000,0 0 8px rgba(255,215,0,.15);letter-spacing:2px;
  margin-top:2px;
}

/* ═══ RS SKILLS GRID ═══ */
.sg{padding:4px;background:var(--rs-bg)}
.sk-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px}

.sk{
  background:var(--rs-cell);
  background-image:
    repeating-linear-gradient(-45deg,transparent,transparent 4px,rgba(255,255,255,.012) 4px,rgba(255,255,255,.012) 8px);
  border:1px solid var(--rs-border2);
  cursor:pointer;
  transition:all .1s;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  padding:5px 8px;
  min-height:48px;
  gap:6px;
}
.sk:active{transform:scale(.96);background:var(--rs-header)}

/* RS glow on 99 and 120 */
.sk.c99{border-color:var(--rs-gold);
  box-shadow:inset 0 0 12px rgba(255,215,0,.04)}
.sk.c120{border-color:#88f;
  box-shadow:inset 0 0 12px rgba(128,128,255,.06)}

/* Skill icon - RS style */
.sk-i{
  font-size:24px;
  line-height:1;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.5));
  min-width:28px;
  text-align:center;
}

/* Level numbers container - RS right side */
.sk-nums{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:0;
}

.sk-l{
  font-family:var(--fp);
  font-size:15px;
  font-weight:700;
  color:var(--rs-gold);
  text-shadow:1px 1px 0 #000,0 0 4px rgba(255,215,0,.2);
  line-height:1.1;
}
.sk-l2{
  font-family:var(--fp);
  font-size:13px;
  color:var(--rs-gold2);
  text-shadow:1px 1px 0 #000;
  line-height:1.1;
  opacity:.8;
}

/* Cape badge */
.sk-cape{position:absolute;top:1px;right:1px;font-size:5px;font-family:var(--fp);
  padding:0 3px;display:none;z-index:2}
.sk.c99 .sk-cape{display:block;background:linear-gradient(135deg,#ffd700,#f40);color:#000}
.sk.c120 .sk-cape{display:block;background:linear-gradient(135deg,#ccf,#88f,#ffd700);color:#000}

/* XP bar at bottom of cell */
.sk-xpbar{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(0,0,0,.5)}
.sk-xpfill{height:100%;transition:width .6s ease}

/* Hover glow */
@media(hover:hover){.sk:hover{background:#252018;border-color:var(--rs-border)}}

/* ═══ DETAIL PANEL ═══ */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;
  opacity:0;pointer-events:none;transition:opacity .2s}
.ov.open{opacity:1;pointer-events:auto}
.pnl{position:fixed;bottom:0;left:0;right:0;max-height:90vh;z-index:201;
  background:var(--s1);border-top:2px solid var(--acc);
  transform:translateY(100%);transition:transform .25s ease;
  overflow-y:auto;overscroll-behavior:contain;
  padding-bottom:env(safe-area-inset-bottom,0)}
.ov.open .pnl{transform:translateY(0)}

.ph{padding:10px 12px;border-bottom:1px solid var(--b);position:sticky;top:0;background:var(--s1);z-index:1}
.ph-r{display:flex;align-items:center;gap:8px}
.ph-i{font-size:20px}
.ph-info{flex:1}
.ph-nm{font-family:var(--fp);font-size:12px}
.ph-sub{font-size:7px;color:var(--m2);font-family:var(--fp);letter-spacing:1px;margin-top:1px}
.ph-x{font-size:16px;color:var(--m);cursor:pointer;padding:4px}

.px{padding:8px 12px;background:var(--bg);border-bottom:1px solid var(--b)}
.px-r{display:flex;justify-content:space-between;margin-bottom:2px}
.px-l{font-size:7px;color:var(--m2);font-family:var(--fp)}
.px-v{font-size:8px;font-family:var(--fp)}
.px-bar{height:8px;background:var(--b);border-radius:4px;overflow:hidden;margin-top:4px}
.px-fill{height:100%;border-radius:4px}

/* Goal setter */
.goal-set{padding:6px 12px;background:var(--s2);border-bottom:1px solid var(--b);
  display:flex;align-items:center;gap:6px}
.goal-set label{font-size:7px;color:var(--m2);font-family:var(--fp)}
.goal-set input{width:50px;padding:3px 5px;background:var(--bg);border:1px solid var(--b);
  color:var(--acc);font-family:var(--fp);font-size:9px;text-align:center}
.goal-set button{padding:3px 8px;background:var(--acc);color:#000;border:none;
  font-family:var(--fp);font-size:7px;cursor:pointer}
.goal-info{font-size:7px;color:var(--m);font-family:var(--fp);flex:1;text-align:right}

.pd{font-size:9px;color:var(--m2);padding:8px 12px;line-height:1.5;border-bottom:1px solid var(--b)}

.ps{padding:6px 12px}
.ps-t{font-family:var(--fp);font-size:7px;letter-spacing:1px;margin-bottom:4px;
  padding-bottom:3px;border-bottom:1px solid var(--b);display:flex;justify-content:space-between}

/* Perks */
.pk{margin-bottom:2px;border:1px solid var(--b);overflow:hidden;transition:all .15s}
.pk.done{border-color:rgba(61,255,126,.3);border-left:3px solid var(--ok)}
.pk.next{border-color:rgba(255,209,102,.3);border-left:3px solid var(--warn);background:rgba(255,209,102,.01)}
.pk.locked{opacity:.3}
.pk-head{display:flex;align-items:center;gap:6px;padding:6px 8px;cursor:pointer;min-height:32px}
.pk-ico{font-size:10px;min-width:12px;text-align:center}
.pk.done .pk-ico{color:var(--ok)}
.pk.next .pk-ico{color:var(--warn)}
.pk.locked .pk-ico{color:var(--m)}
.pk-nm{font-size:8px;flex:1}
.pk-lvl{font-size:7px;font-family:var(--fp);color:var(--m2);min-width:32px;text-align:right}
.pk-body{display:none;padding:6px 8px 8px 26px;border-top:1px solid var(--b);background:var(--bg)}
.pk.expanded .pk-body{display:block}
.pk-req{font-size:8px;color:var(--m2);margin-bottom:4px}
.pk-detail{font-size:8px;color:var(--txt);line-height:1.5}
.pk-xp-tag{display:inline-block;font-size:7px;font-family:var(--fp);color:var(--acc);
  border:1px solid rgba(200,255,0,.2);padding:1px 5px;margin-top:4px}

/* ═══ SYNC ═══ */
.sync{padding:12px}
.sync-title{font-family:var(--fp);font-size:9px;color:var(--acc);margin-bottom:6px}
.sync-desc{font-size:8px;color:var(--m2);line-height:1.5;margin-bottom:10px}
.sync-box{padding:10px;background:var(--bg);border:1px solid var(--b);margin-bottom:6px}
.sync-box label{font-size:7px;color:var(--m2);font-family:var(--fp);display:block;margin-bottom:4px}
.sync-box input{font-size:9px;color:var(--m2)}
.sync-box .hint{font-size:7px;color:var(--m);margin-top:3px;line-height:1.4}
.sync-btn{width:100%;padding:10px;background:var(--acc);color:#000;border:none;
  font-family:var(--fp);font-size:9px;cursor:pointer;letter-spacing:1px;margin-top:8px}
.sync-btn:disabled{opacity:.3;cursor:default}
.sync-btn:active:not(:disabled){opacity:.8}
.sync-result{margin-top:8px;font-size:8px;font-family:var(--fp);text-align:center;display:none}
.sync-last{font-size:7px;color:var(--m);text-align:center;margin-top:6px;font-family:var(--fp)}

/* ═══ LOG ═══ */
.le{padding:6px 10px;border-bottom:1px solid var(--b);display:flex;gap:6px;align-items:flex-start}
.le-d{font-size:6px;color:var(--m);font-family:var(--fp);min-width:38px;margin-top:1px}
.le-b{flex:1}
.le-t{font-size:8px}
.le-tags{display:flex;gap:2px;margin-top:1px;flex-wrap:wrap}
.le-tag{font-size:5px;font-family:var(--fp);padding:0 3px;border:1px solid var(--b);color:var(--m2)}
.le-xp{font-size:7px;font-family:var(--fp);color:var(--acc);min-width:36px;text-align:right}
.le-empty{text-align:center;padding:24px;color:var(--m);font-size:8px;font-family:var(--fp)}

/* ═══ STATS ═══ */
.stg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:8px}
.st{background:var(--s1);border:1px solid var(--b);padding:8px;text-align:center}
.st-v{font-family:var(--fp);font-size:12px;color:var(--acc)}
.st-l{font-size:6px;color:var(--m2);font-family:var(--fp);margin-top:2px;letter-spacing:.5px}
.lb{padding:0 12px;margin-bottom:5px}
.lb-r{display:flex;justify-content:space-between;margin-bottom:1px}
.lb-n{font-size:7px;font-family:var(--fp)}
.lb-v{font-size:7px;font-family:var(--fp);color:var(--m2)}
.lb-bar{height:4px;background:var(--b);border-radius:2px;overflow:hidden;margin-bottom:6px}
.lb-f{height:100%;border-radius:2px}

/* ═══ LEVEL UP SCREEN ═══ */
.lu{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.93);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.lu.show{display:flex;animation:fadeIn .4s}
.lu-sparkle{position:absolute;width:100%;height:100%;pointer-events:none;overflow:hidden}
.lu-sparkle i{position:absolute;width:3px;height:3px;background:var(--gold);border-radius:50%;
  animation:sparkle 1.5s ease infinite}
@keyframes sparkle{0%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0) translateY(-40px)}}
.lu-ico{font-size:56px;animation:bob 1.2s ease infinite;z-index:1}
.lu-title{font-family:var(--f8);font-size:10px;color:var(--gold);text-align:center;
  line-height:2;z-index:1;text-shadow:0 0 20px rgba(255,215,0,.4);animation:glow 2s ease infinite}
.lu-perk{font-family:var(--fp);font-size:8px;color:var(--ok);z-index:1;text-align:center;margin-top:4px}
.lu-sub{font-family:var(--fp);font-size:7px;color:var(--m2);z-index:1;margin-top:2px}
.lu-tap{font-size:7px;color:var(--m);font-family:var(--fp);z-index:1;margin-top:16px;animation:blink 1.5s ease infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes glow{0%,100%{text-shadow:0 0 10px rgba(255,215,0,.3)}50%{text-shadow:0 0 30px rgba(255,215,0,.6)}}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ═══ NAV ═══ */
.nav{position:fixed;bottom:0;left:0;right:0;height:46px;background:var(--s1);
  border-top:1px solid var(--b);display:flex;z-index:100;
  padding-bottom:env(safe-area-inset-bottom,0)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:0;color:var(--m);font-family:var(--fp);font-size:5px;cursor:pointer}
.nb.on{color:var(--acc)}
.nb span:first-child{font-size:12px;line-height:1.2}

.main{padding-bottom:calc(50px + env(safe-area-inset-bottom,0))}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--b2)}

/* ═══ TOTAL LEVEL SUMMARY ═══ */
.total-bar{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:4px 10px;background:var(--rs-bg);border-bottom:1px solid var(--rs-border2);
}
.total-bar span{font-family:var(--fp);font-size:7px;color:var(--rs-gold2)}
.total-bar b{color:var(--rs-gold)}
.sk-locked{opacity:.35;filter:grayscale(.6)}
.sk-locked:active{transform:none}
.sk-lock{position:absolute;top:2px;right:4px;font-size:9px;opacity:.7}
.px-block{margin:6px 12px;padding:8px;background:rgba(255,59,59,.08);border:1px solid var(--danger);text-align:center}
.px-block-t{font-family:var(--fp);font-size:8px;color:var(--danger);margin-bottom:4px}
.px-block-r{font-size:8px;color:var(--txt);font-family:var(--f);margin-top:2px}
.tr-section{padding:6px 12px 8px;border-bottom:1px solid var(--b)}
.tr-title{font-family:var(--fp);font-size:7px;color:var(--acc);margin-bottom:4px;letter-spacing:.5px}
.tr-row{display:flex;align-items:center;gap:4px;padding:3px 0;font-size:7px;font-family:var(--f)}
.tr-tier{width:50px;font-family:var(--fp);font-size:6px;color:var(--m2);text-transform:uppercase}
.tr-act{flex:1;color:var(--txt);line-height:1.3}
.tr-xp{width:36px;text-align:right;font-family:var(--fp);font-size:7px}
.tr-ok .tr-tier{color:var(--ok)}
.tr-ok .tr-xp{color:var(--acc)}
.tr-off{opacity:.45}
.tr-off .tr-xp{color:var(--m)}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-r1"><h1>⚔ RENTA SHALET</h1><div class="hdr-total" id="hT"></div></div>
  <div class="hdr-bar"><div class="hdr-fill" id="hF"></div></div>
  <div class="hdr-info" id="hI"></div>
</div>
<div class="main">
  <div class="sys" id="sys"></div>
  <div class="tabs" id="tabs"></div>
  <div id="tc"></div>
</div>

<div class="ov" id="ov" onclick="closeP()"><div class="pnl" id="pnl" onclick="event.stopPropagation()"></div></div>
<div class="lu" id="lu" onclick="dismissLU()">
  <div class="lu-sparkle" id="luSp"></div>
  <div class="lu-ico" id="luI"></div>
  <div class="lu-title" id="luT"></div>
  <div class="lu-perk" id="luPk"></div>
  <div class="lu-sub" id="luS"></div>
  <div class="lu-tap">— tap to continue —</div>
</div>
<div class="nav">
  <div class="nb on" data-t="skills" onclick="go('skills')"><span>⚔</span>Skills</div>
  <div class="nb" data-t="inv" onclick="go('inv')"><span>🎒</span>Invent.</div>
  <div class="nb" data-t="log" onclick="go('log')"><span>📜</span>Log</div>
  <div class="nb" data-t="quest" onclick="go('quest')"><span>🏆</span>Quest</div>
  <div class="nb" data-t="stats" onclick="go('stats')"><span>📊</span>Stats</div>
</div>

<script>
// ═══════════════════════════════════════════════════
// SKILLS DEFINITION — 11 Skills
// ═══════════════════════════════════════════════════

const S = [
  // ── COMBAT SKILLS ──
  {id:'attack',name:'Attack',i:'⚔',l:'combat',soc:'INSPECCIÓN',
   desc:'Tu habilidad de atacar problemas reales. Cada inspección es un golpe certero al caos del chalet.',
   pk:[
    {id:'a1',n:'Registro de hallazgo',r:'Formulario básico funcional',xp:200,lv:1,d:'El fundamento. Poder registrar un hallazgo con descripción y área.',ck:s=>s.f.guardarInspeccion||s.f.guardarHallazgo},
    {id:'a2',n:'Estado R/Y/G',r:'Botones de severidad por colores',xp:300,lv:5,d:'Semáforo visual: Rojo=crítico, Amarillo=atención, Verde=ok/mejora.',ck:s=>s.u.estadoRYG},
    {id:'a3',n:'Subtipo',r:'problema / mejora / mantenimiento',xp:500,lv:10,d:'Clasificar hallazgos por naturaleza.',ck:s=>s.s.subtipo},
    {id:'a4',n:'Sistemas afectados',r:'Tags de sistemas seleccionables',xp:500,lv:14,d:'Eléctrico, plomería, estructura...',ck:s=>s.s.sistemas},
    {id:'a5',n:'Score automático',r:'imp × dep × prop con multiplicadores',xp:800,lv:20,d:'El score se calcula solo de los datos que ya existen.',ck:s=>s.f.getScoreEfectivo},
    {id:'a6',n:'Accordion de áreas',r:'Inspección organizada por áreas colapsables',xp:600,lv:16,d:'Cada área del chalet es un acordeón.',ck:s=>s.u.accordion},
    {id:'a7',n:'accion_tipo tipado',r:'Enum: reparar/reemplazar/limpiar/etc',xp:1200,lv:30,d:'Prerequisito para AI. Enum, no texto libre.',ck:s=>s.s.accion_tipo},
    {id:'a8',n:'Captura ≤3 taps',r:'Fase 0: área→estado→guardar',xp:2500,lv:45,d:'Máximo 3 taps para registrar realidad.',ck:()=>false},
    {id:'a9',n:'Botones ≥48px',r:'Touch targets grandes en toda acción',xp:2000,lv:50,d:'Estándar Material Design: 48dp mínimo.',ck:()=>false},
    {id:'a10',n:'Defaults inteligentes',r:'Costo=medio, imp=3 pre-seleccionados',xp:2000,lv:55,d:'Pre-llenar ahorra taps y reduce fricción.',ck:()=>false},

// ═══ SKILL UNLOCK PREREQUISITES ═══
const PREREQS = {
  attack: null,
  strength: null,
  defence: null,
  magic: { requires: [{ skill: 'attack', level: 5 }] },
  ranged: { requires: [{ skill: 'magic', level: 8 }] },
  prayer: { requires: [{ skill: 'attack', level: 5 }, { skill: 'magic', level: 8 }] },
  slayer: { requires: [{ skill: 'prayer', level: 12 }] },
  runecraft: null,
  agility: null,
  invention: { requires: [{ skill: 'runecraft', level: 12 }] },
  hitpoints: { requires: [{ skill: 'attack', level: 1 }] }
};

function isUnlocked(skillId) {
  const pr = PREREQS[skillId];
  if (!pr) return true;
  return pr.requires.every(r => gl(r.skill) >= r.level);
}

function getBlockers(skillId) {
  const pr = PREREQS[skillId];
  if (!pr) return [];
  return pr.requires.filter(r => gl(r.skill) < r.level).map(r => {
    const sk = S.find(s => s.id === r.skill);
    return { name: sk ? sk.name : r.skill, icon: sk ? sk.i : '', need: r.level, have: gl(r.skill) };
  });
}

function runAudit(au){
  const ups=[];
  S.forEach(sk=>{
    if(!G.sk[sk.id])G.sk[sk.id]={xp:0,dn:{},goal:null};
    sk.pk.forEach(p=>{
      const was=G.sk[sk.id].dn[p.id]||false;
      const now=p.ck(au);
      if(now&&!was){
        G.sk[sk.id].dn[p.id]=true;
        const oldL=lF(G.sk[sk.id].xp);
        G.sk[sk.id].xp+=p.xp;
        const newL=lF(G.sk[sk.id].xp);
        if(newL>oldL)ups.push({sk,lv:newL,perk:p});
        G.log.unshift({dt:new Date().toISOString(),t:`🔓 ${p.n}`,xp:p.xp,sk:[sk.id],a:true});
      }else if(!now&&was){
        G.sk[sk.id].dn[p.id]=false;
        G.sk[sk.id].xp=Math.max(0,G.sk[sk.id].xp-p.xp);
      }
    });
  });
  // Check quests
  QUESTS.forEach(q => {
    const was = G.qd[q.id] || false;
    const now = q.check();
    if (now && !was) {
      G.qd[q.id] = true;
      G.log.unshift({ dt: new Date().toISOString(), t: `🏆 Quest: ${q.name}`, xp: 0, sk: q.affects, a: true });
    }
  });
  G.ls=new Date().toISOString();sv();render();
  return ups;
}

function rSy(){
  const ad=G.ad;

  if(ad&&ad.d){

  if(ad&&typeof ad.d?.caja==='number'){

  }

  return`<div style="padding:10px 12px">

function hHU(i){const f=i.files[0];if(!f)return;const r=new FileReader();
  r.onload=e=>{_pH=e.target.result;const b=document.getElementById('sB');if(b){b.disabled=false;b.textContent=`⚔ AUDITAR (${(f.size/1024).toFixed(0)}KB)`}};r.readAsText(f)}
function hSU(i){const f=i.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{_pS=e.target.result};r.readAsText(f)}

function doSync(){
  if(!_pH)return;
  const au=auditHTML(_pH);
  if(_pS){const dc=auditState(_pS);if(dc)au.d=dc}
  G.ad=au;
  const ups=runAudit(au);
  
  const btn=document.getElementById('sB');
  const rect=btn?.getBoundingClientRect();
  if(rect){
    const xpBySkill={};
    ups.forEach(u=>{
      if(!xpBySkill[u.sk.id])xpBySkill[u.sk.id]={sk:u.sk,xp:0};
      xpBySkill[u.sk.id].xp+=u.perk?.xp||0;
    });
    const recentLog=G.log.filter(e=>e.a&&new Date(e.dt)>new Date(Date.now()-2000));
    recentLog.forEach(e=>{
      (e.sk||[]).forEach(sid=>{
        if(!xpBySkill[sid]){
          const sk=S.find(s=>s.id===sid);
          if(sk)xpBySkill[sid]={sk,xp:e.xp};
        }
      });
    });
    let delay=0;
    Object.values(xpBySkill).forEach(({sk,xp})=>{
      setTimeout(()=>{
        const x=rect.left+Math.random()*rect.width;
        const y=rect.top-10-Math.random()*20;
        xpDrop(x,y,xp,sk.i);
      },delay);
      delay+=300;
    });
  }
  
  const el=document.getElementById('sR');
  if(el){
    const td=S.reduce((s,sk)=>s+sk.pk.filter(p=>G.sk[sk.id]?.dn[p.id]).length,0);
    const tp=S.reduce((s,sk)=>s+sk.pk.length,0);
    const totalXp=ups.reduce((s,u)=>s+(u.perk?.xp||0),0);
    el.style.display='block';el.style.color=ups.length?'var(--ok)':'var(--m2)';
    el.innerHTML=ups.length
      ?`✓ ${td}/${tp} perks · ${ups.length} LEVEL UP${ups.length>1?'S':''} · +${fm(totalXp)} XP`
      :`✓ ${td}/${tp} perks · sin cambios`;
  }
  
  if(ups.length){
    let luDelay=800;
    ups.forEach((u,i)=>{
      if(i===0)setTimeout(()=>showLU(u.sk,u.lv,u.perk),luDelay);
    });
    _luQueue=ups.slice(1);
  }
}
let _luQueue=[];

// ═══ LEVEL UP ═══
function showLU(sk,nl,perk){
  const o=document.getElementById('lu');
  document.getElementById('luI').textContent=sk.i;
  let t,pk='',sub=sk.soc;
  if(nl===99){t=`🎉 SKILL CAPE!\n${sk.name} → 99`;sub='Sistema funcional en campo';}
  else if(nl===120){t=`👑 MASTER CAPE!\n${sk.name} → 120`;sub='Producto formal vendible';}
  else{t=`LEVEL UP!\n${sk.name} → ${nl}`;}
  if(perk)pk=`🔓 ${perk.n}`;
  document.getElementById('luT').textContent=t;
  document.getElementById('luPk').textContent=pk;
  document.getElementById('luS').textContent=sub;
  const sp=document.getElementById('luSp');sp.innerHTML='';
  for(let i=0;i<20;i++){
    const s=document.createElement('i');
    s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
    s.style.animationDelay=Math.random()*1.5+'s';
    s.style.background=nl>=99?'var(--gold)':nl>=50?'var(--acc)':'var(--ok)';
    sp.appendChild(s);
  }
  o.classList.add('show');
}
function dismissLU(){
  document.getElementById('lu').classList.remove('show');
  if(_luQueue&&_luQueue.length){
    const next=_luQueue.shift();
    setTimeout(()=>showLU(next.sk,next.lv,next.perk),400);
  }
}

          <div style="font-family:var(--fp);font-size:7px;color:${col}">${q.name}</div>
          ${isActive&&q.pct?`<div style="height:3px;background:var(--b);border-radius:2px;overflow:hidden;margin-top:3px">
            <div style="height:100%;width:${q.pct}%;background:${col}"></div></div>
          <div style="font-size:6px;color:var(--m2);font-family:var(--fp);margin-top:1px">${q.pct}% completo</div>`:
          isDone?`<div style="font-size:6px;color:var(--ok);font-family:var(--fp);margin-top:2px">✓ COMPLETADO</div>`:''}
        </div>
        <div style="font-size:9px">${ico}</div>
      </div>
      <div class="qb" style="display:none;padding:0 10px 8px;">
        <div style="font-size:7px;color:var(--m2);line-height:1.5;margin-bottom:4px">${q.desc}</div>
        <div style="font-size:7px;color:var(--gold);font-family:var(--fp)">→ ${q.reward}</div>
        ${q.phases?`<div style="margin-top:6px;border-top:1px solid var(--rs-border);padding-top:6px">
          ${q.phases.map(ph=>{
            const pc=ph.status==='done'?'var(--ok)':ph.status==='partial'?'var(--warn)':'var(--m)';
            const pi=ph.status==='done'?'✅':ph.status==='partial'?'⚡':'🔒';
            return`<div style="border:1px solid var(--rs-border2);margin-bottom:3px;background:var(--bg)">
              <div style="display:flex;align-items:center;gap:6px;padding:5px 7px">
                <span>${pi}</span>
                <div style="font-family:var(--fp);font-size:6px;color:${pc};flex:1">${ph.name}</div>
              </div>
              <div style="padding:0 7px 5px">
                <div style="font-size:6px;color:var(--m2);margin-bottom:3px">${ph.desc}</div>
                ${ph.items.map(it=>`<div style="font-size:6px;color:var(--m);padding:1px 0">· ${it}</div>`).join('')}
              </div></div>`;
          }).join('')}</div>`:''}
      </div></div>`;
  });

  // Infraestructura — el camino real
  h+=`<div style="font-family:var(--fp);font-size:7px;color:var(--gold);letter-spacing:1px;margin:10px 0 6px">🏗 INFRAESTRUCTURA — HOY → PLATAFORMA</div>`;
  h+=`<div style="background:var(--rs-cell);border:1px solid var(--rs-border);overflow:hidden">`;
  ROADMAP.infra.forEach((v,i)=>{
    h+=`<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;${i>0?'border-top:1px solid var(--rs-border2)':''}">
      <span style="font-size:12px">${v.done?'✅':'🔒'}</span>
      <div style="flex:1">
        <div style="font-size:7px;color:${v.done?'var(--ok)':'var(--txt)'};font-family:var(--fp)">${v.n}</div>
        <div style="font-size:6px;color:var(--m2)">${v.desc}</div>
      </div>
      <div style="font-size:6px;color:var(--m);font-family:var(--fp);text-align:right;white-space:nowrap">${v.lv}</div>
    </div>`;
  });
  h+=`</div>`;

  // Skill progress to 99
  h+=`<div style="font-family:var(--fp);font-size:7px;color:var(--gold);letter-spacing:1px;margin:10px 0 6px">⚔ CAMINO A NIVEL 99 (MULTI-CHALET)</div>`;
  h+=`<div style="background:var(--rs-cell);border:1px solid var(--rs-border);padding:8px 10px">`;
  S.forEach(sk=>{
    const lv=gl(sk.id), pct=Math.round((lv/99)*100);
    const col=lv>=99?'var(--ok)':lv>=50?'var(--warn)':'var(--c3)';
    h+=`<div style="margin-bottom:6px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
        <div style="font-size:8px;font-family:var(--fp);color:${col}">${sk.i} ${sk.soc}</div>
        <div style="font-size:8px;font-family:var(--fp);color:${col}">Lv ${lv}</div>
      </div>
      <div style="height:4px;background:var(--b);border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${col};border-radius:2px"></div>
      </div>
    </div>`;
  });
  h+=`</div>`;

  // Frase
  h+=`<div style="margin:10px 0;padding:10px;background:var(--rs-cell);border:1px solid var(--rs-border);border-left:3px solid var(--gold)">
    <div style="font-size:6px;color:var(--gold);font-family:var(--fp);line-height:1.8">
      "El sistema no persigue perfección.<br>
      Persigue estabilidad operativa inteligente,<br>
      aprendizaje verificable y replicación limpia."
    </div>
  </div></div>`;
  return h;
}

function rSt(){
  const tx=gtx(),tl=gtl(),c99=S.filter(s=>gl(s.id)>=99).length,c120=S.filter(s=>gl(s.id)>=120).length;
  const best=S.reduce((b,s)=>gl(s.id)>gl(b.id)?s:b,S[0]);
  const worst=S.reduce((w,s)=>gl(s.id)<gl(w.id)?s:w,S[0]);
  const td=S.reduce((s,sk)=>s+sk.pk.filter(p=>G.sk[sk.id]?.dn[p.id]).length,0);
  const tp=S.reduce((s,sk)=>s+sk.pk.length,0);

  const ls=['combat','juicio','verificacion','aprendizaje','meta'];
  const bars=ls.map(l=>{
    const sks=S.filter(s=>s.l===l);
    const avg=Math.round(sks.reduce((s,sk)=>s+gl(sk.id),0)/sks.length);
    return`<div class="lb"><div class="lb-r"><span class="lb-n" style="color:${LC[l]}">${LN[l]}</span>
      <span class="lb-v">Avg ${avg}</span></div>
      <div class="lb-bar"><div class="lb-f" style="width:${Math.min(100,(avg/99)*100)}%;background:${LC[l]}"></div></div></div>`;
  }).join('');

  let healthInfo='',cashInfo='';
  if(G.ad&&G.ad.d){
    const dd=G.ad.d,cr=dd.criticos||0,h=dd.hallazgos||0,r=dd.resueltos||0;
    const ratio=h>0?r/h:0;
    const hlbl=cr>5?'CRÍTICO':cr>2?'FRÁGIL':ratio<.3?'INESTABLE':ratio<.6?'RECUPERANDO':ratio<.85?'ESTABLE':'FUERTE';
    const hclr=cr>2?'var(--danger)':ratio<.6?'var(--warn)':'var(--ok)';
    healthInfo=`<div class="st"><div class="st-v" style="color:${hclr};font-size:8px">${hlbl}</div><div class="st-l">SALUD</div></div>`;
    if(typeof dd.caja==='number'){
      const cc=dd.caja,cclr=cc<0?'var(--danger)':cc<2000?'var(--warn)':'var(--ok)';
      cashInfo=`<div class="st"><div class="st-v" style="color:${cclr}">Q${fm(Math.abs(cc))}</div><div class="st-l">CASHSTACK</div></div>`;
    }
  }

  return`<div class="stg">
    <div class="st"><div class="st-v">${fm(tx)}</div><div class="st-l">TOTAL XP</div></div>
    <div class="st"><div class="st-v">${tl}</div><div class="st-l">LEVELS</div></div>
    <div class="st"><div class="st-v">${td}/${tp}</div><div class="st-l">PERKS</div></div>
    <div class="st"><div class="st-v">${c99}</div><div class="st-l">CAPES</div></div>
    <div class="st"><div class="st-v">${c120}</div><div class="st-l">MASTER</div></div>
    <div class="st"><div class="st-v">${gcl()}</div><div class="st-l">COMBAT</div></div>
    ${healthInfo}${cashInfo}
  </div>
  <div style="padding:4px 12px 6px;font-size:7px;font-family:var(--fp);color:var(--m2)">
    BEST: ${best.i} ${best.name} (${gl(best.id)}) · WEAKEST: ${worst.i} ${worst.name} (${gl(worst.id)})
  </div>
  <div style="padding:4px 12px 6px">
  <div style="font-size:7px;font-family:var(--fp);color:var(--gold);margin-bottom:4px">🏆 QUESTS</div>
  ${QUESTS.map(q=>`<div style="font-size:7px;color:${G.qd[q.id]?'var(--ok)':'var(--m)'};padding:1px 0;font-family:var(--f)">
    ${G.qd[q.id]?'✓':'○'} ${q.name}${G.qd[q.id]?'':' — '+q.desc}
  </div>`).join('')}
</div>
  ${bars}
  <div style="text-align:center;padding:16px">
    <button style="padding:5px 12px;background:var(--b);border:1px solid var(--b2);color:var(--danger);
      font-family:var(--fp);font-size:7px;cursor:pointer"
      onclick="if(confirm('Reset todo?')){localStorage.removeItem('${KY}');G=df();sv();R()}">RESET</button>
  </div>`;
}

// INIT
R();
const render=R;
</script>
</body>
</html>
